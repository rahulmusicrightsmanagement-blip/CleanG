version: 2
updates:
  # Backend Python dependencies.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "security"]

  # Frontend npm dependencies.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "security"]

  # The GitHub Actions used by the security workflow above.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "security"]
